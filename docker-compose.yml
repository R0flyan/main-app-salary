services:
  reverse-proxy:
    image: nginx:1.27-alpine
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - public
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    networks:
      - public
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-salary}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-salary-password}
      POSTGRES_DB: ${POSTGRES_DB:-salary}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      SECRET_KEY: ${SECRET_KEY:-change-me-long-random-secret}
      HH_API_URL: ${HH_API_URL:-https://api.hh.ru/vacancies}
      HH_USER_AGENT: ${HH_USER_AGENT:-salary-app/1.0 (admin@example.com)}
      HH_USE_ENV_PROXY: ${HH_USE_ENV_PROXY:-false}
      HH_ENABLE_FALLBACK: ${HH_ENABLE_FALLBACK:-true}
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-salary-minio}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-salary-minio-secret}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-joby-files}
      S3_PRESIGNED_EXPIRE_SECONDS: ${S3_PRESIGNED_EXPIRE_SECONDS:-300}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-5242880}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8080}
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-salary}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-salary-password}
      POSTGRES_DB: ${POSTGRES_DB:-salary}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-salary-minio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-salary-minio-secret}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-salary-minio}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-salary-minio-secret}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-joby-files}
    networks:
      - internal
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 "$$S3_ACCESS_KEY" "$$S3_SECRET_KEY"
        mc mb --ignore-existing "local/$$S3_BUCKET_NAME"
        mc anonymous set none "local/$$S3_BUCKET_NAME"
    restart: "no"

volumes:
  postgres-data:
  minio-data:

networks:
  public:
  internal:
    internal: true
